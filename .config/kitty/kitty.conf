# ~/.config/kitty/kitty.conf

# --- Font ---
font_family      Iosevka Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        15.0

# --- Tokyo Night (Night) ---
foreground #c0caf5
background #1a1b26
selection_foreground #1a1b26
selection_background #c0caf5

cursor            #c0caf5
cursor_text_color #1a1b26

url_color #73daca

# Black
color0  #15161e
color8  #414868

# Red
color1  #f7768e
color9  #f7768e

# Green
color2  #9ece6a
color10 #9ece6a

# Yellow
color3  #e0af68
color11 #e0af68

# Blue
color4  #7aa2f7
color12 #7aa2f7

# Purple
color5  #bb9af7
color13 #bb9af7

# Cyan
color6  #7dcfff
color14 #7dcfff

# White
color7  #a9b1d6
color15 #c0caf5

# --- i3 behavior ---
remember_window_size  no
initial_window_width  640
initial_window_height 400

# Fix error border
resize_in_steps yes

# --- Performance / UX ---
enable_audio_bell no
confirm_os_window_close 0
scrollback_lines 10000

# --- Cursor ---
cursor_shape beam
cursor_blink_interval 0
